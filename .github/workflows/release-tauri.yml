name: release-tauri

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-tauri
  cancel-in-progress: false

jobs:
  bump-and-tag:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read-version.outputs.version }}
      tag: ${{ steps.make-tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Restore Bun cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('tauri-app/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        working-directory: tauri-app
        run: bun install --frozen-lockfile

      - name: Bump version
        working-directory: tauri-app
        run: bun run version:bump

      - name: Read version
        id: read-version
        working-directory: tauri-app
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Make tag
        id: make-tag
        run: |
          TAG="v${{ steps.read-version.outputs.version }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        env:
          BRANCH: ${{ github.ref_name }}
          TAG: ${{ steps.make-tag.outputs.tag }}
          VERSION: ${{ steps.read-version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tauri-app/package.json tauri-app/src-tauri/Cargo.toml tauri-app/src-tauri/Cargo.lock tauri-app/src-tauri/tauri.conf.json
          git commit -m "chore(release): bump version to ${VERSION}"
          git tag "$TAG"
          git push origin "HEAD:${BRANCH}"
          git push origin "$TAG"

  create-release:
    needs: bump-and-tag
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.ensure-release.outputs.release_id }}
    steps:
      - name: Ensure release exists
        id: ensure-release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = "${{ needs.bump-and-tag.outputs.tag }}";
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            try {
              const { data } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              core.setOutput("release_id", String(data.id));
            } catch (error) {
              if (error.status !== 404) throw error;
              const releaseBody = [
                "自动构建发布版本。",
                "",
                "- 包含 Tauri updater 元数据（latest.json）",
                "- 支持 Windows x86 与 macOS Apple Silicon",
                "",
                "macOS 说明：",
                "- 如果首次打开时出现“yls-code”已损坏、无法打开、应移到废纸篓的提示，请在终端执行：xattr -rd com.apple.quarantine \"/Applications/yls-code.app\"",
                "- 仅在你确认安装包来自本仓库 GitHub Release 时执行上述操作。",
              ].join("\n");
              const { data } = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: `yls-code ${tag}`,
                body: releaseBody,
                draft: true,
                prerelease: false,
              });
              core.setOutput("release_id", String(data.id));
            }

  build-windows:
    needs: [bump-and-tag, create-release]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-and-tag.outputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Restore Bun cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('tauri-app/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
          targets: i686-pc-windows-msvc

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            tauri-app/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: tauri-app
        run: bun install --frozen-lockfile

      - name: Normalize updater public key
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_CONFIG_PATH: tauri-app/src-tauri/tauri.conf.json
        run: node ./scripts/normalize-updater-pubkey.mjs

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: tauri-app
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ needs.bump-and-tag.outputs.tag }}
          releaseName: "yls-code v__VERSION__"
          releaseBody: |
            自动构建发布版本。
            - 包含 Tauri updater 元数据（latest.json）
            - 支持 Windows x86 与 macOS Apple Silicon
            
            macOS 说明：
            - 如果首次打开时出现“yls-code”已损坏、无法打开、应移到废纸篓的提示，请在终端执行：`xattr -rd com.apple.quarantine "/Applications/yls-code.app"`
            - 仅在你确认安装包来自本仓库 GitHub Release 时执行上述操作。
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          tauriScript: bun run tauri
          args: --target i686-pc-windows-msvc

  build-macos:
    needs: [bump-and-tag, create-release]
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-and-tag.outputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Restore Bun cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('tauri-app/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
          targets: aarch64-apple-darwin

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            tauri-app/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: tauri-app
        run: bun install --frozen-lockfile

      - name: Normalize updater public key
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_CONFIG_PATH: tauri-app/src-tauri/tauri.conf.json
        run: node ./scripts/normalize-updater-pubkey.mjs

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: tauri-app
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ needs.bump-and-tag.outputs.tag }}
          releaseName: "yls-code v__VERSION__"
          releaseBody: |
            自动构建发布版本。
            - 包含 Tauri updater 元数据（latest.json）
            - 支持 Windows x86 与 macOS Apple Silicon
            
            macOS 说明：
            - 如果首次打开时出现“yls-code”已损坏、无法打开、应移到废纸篓的提示，请在终端执行：`xattr -rd com.apple.quarantine "/Applications/yls-code.app"`
            - 仅在你确认安装包来自本仓库 GitHub Release 时执行上述操作。
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          tauriScript: bun run tauri
          updaterJsonPreferNsis: true
          args: --target aarch64-apple-darwin

  finalize-release:
    needs: [bump-and-tag, create-release, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-and-tag.outputs.tag }}

      - name: Fetch release payload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        run: |
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
            -o release.json

      - name: Fetch latest.json asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_JSON_ASSET_ID=$(node -e 'const release = require("./release.json"); const asset = release.assets.find((item) => item.name === "latest.json"); if (!asset) { process.exit(1); } process.stdout.write(String(asset.id));')
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/assets/${LATEST_JSON_ASSET_ID}" \
            -o latest.json

      - name: Verify updater assets
        env:
          RELEASE_JSON_PATH: release.json
          LATEST_JSON_PATH: latest.json
        run: node ./scripts/verify-release-assets.mjs

      - name: Publish release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: Number("${{ needs.create-release.outputs.release_id }}"),
              draft: false,
              prerelease: false,
            });
